name: Sync PMT from Salesforce

on:
  schedule:
    # Cada 3 horas
    - cron: '0 */3 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'config/hubs.json'
      - 'scripts/sync-pmt.mjs'
      - '.github/workflows/sync-pmt.yml'

permissions:
  contents: write

concurrency:
  group: sync-pmt
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run PMT sync
        env:
          SF_LOGIN_URL: ${{ secrets.SF_LOGIN_URL }}
          SF_CLIENT_ID: ${{ secrets.SF_CLIENT_ID }}
          SF_CLIENT_SECRET: ${{ secrets.SF_CLIENT_SECRET }}
        run: node scripts/sync-pmt.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "koronet-hubs-bot"
          git config user.email "bot@koronet.com"
          git add data/
          if git diff --cached --quiet; then
            echo "no PMT changes"
          else
            git commit -m "chore(pmt): sync from Salesforce"
            git push
          fi
