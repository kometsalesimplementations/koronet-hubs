name: Sync PMT from Salesforce

on:
  schedule:
    # Diario a las 12:00 UTC (~7am Bogot\u00e1)
    - cron: '0 12 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'config/hubs.json'
      - 'scripts/sync-pmt.mjs'
      - '.github/workflows/sync-pmt.yml'

permissions:
  contents: write

concurrency:
  group: sync-pmt
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Run PMT sync
        env:
          SF_AUTH_URL: ${{ secrets.SF_AUTH_URL }}
        run: node scripts/sync-pmt.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "koronet-hubs-bot"
          git config user.email "bot@koronet.com"
          if [ -d data ]; then
            git add data/
            if git diff --cached --quiet; then
              echo "no PMT changes"
            else
              git commit -m "chore(pmt): sync from Salesforce"
              git push
            fi
          else
            echo "no data/ directory — sync produced no files"
          fi
